<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ticket not recognised</title>
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    :root {
      --bg: #f7f9f8;
      --card: #ffffff;
      --text: #2f3a36;
      --muted: #5f6f69;
      --line: #d8e1dd;
      --error-bg: #fdecea;
      --error-text: #7a1f1f;
      --accent: #b8c6c1;
      --accent-deep: #8fa39b;
      --button-text: #24302c;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .wrap {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 40px 16px;
      text-align: center;
    }

    .ticket-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px 20px;
    }

    .status {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .helper {
      margin-top: 10px;
      color: var(--muted);
    }

    .quiet-link {
      appearance: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 48px;
      margin-top: 20px;
      padding: 12px 18px;
      border: 1px solid var(--accent-deep);
      border-radius: 999px;
      background: var(--accent);
      color: var(--button-text);
      text-decoration: none;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="ticket-card">
      <div class="status error">Not recognised</div>
      <p class="helper">Ticket not recognised — please check the code or refer to the organiser.</p>
      <a class="quiet-link" href="scan.html">Scan next ticket</a>
    </section>
  </main>

  <script>
    setTimeout(() => {
      window.location.href = "scan.html";
    }, 5000);
  </script>
</body>
</html>
