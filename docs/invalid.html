<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invalid</title>
  <meta
    name="description"
    content="Invalid ticket scan outcome for door staff."
  />
  <link rel="stylesheet" href="style.css?v=1" />
  <style>
    :root {
      --bg: #f7f9f8;
      --card: #ffffff;
      --text: #2f3a36;
      --muted: #5f6f69;
      --line: #d8e1dd;
      --status: #2f3a36;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    .wrap {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .result-shell {
      padding-top: 40px;
      text-align: center;
    }

    .result-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 30px 20px;
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      line-height: 1.1;
    }

    .event-name {
      margin: 0 0 16px;
      font-size: 1.08rem;
      font-weight: 500;
    }

    .ticket-ref {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    h1.status-invalid {
  color: #8a4a4a; !important;

    .proof-line {
      margin: 0 0 10px;
      font-size: 1.02rem;
    }

    .muted-line {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .back-link {
      margin-top: 24px;
      font-size: 0.95rem;
    }

    .back-link a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="wrap result-shell">
    <section aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">Invalid</h1>
      <p class="sr-only">
        This ticket is not valid for entry.
      </p>
    </section>

    <section class="result-card">
  <p class="kicker">EntryHub</p>
  <h1 class="status-invalid" aria-hidden="true">Invalid</h1>

  <p class="event-name">September Home and Living Show</p>
  <p class="ticket-ref">Ticket reference: SSE-003</p>

  <p class="proof-line">This ticket is not valid for entry</p>
  <p class="proof-line">Please check before allowing entry</p>

  <p class="muted-line">Scanned at the door</p>

  <p class="back-link">
    <a href="door-check.html">Back to door staff view</a>
  </p>
</section>
  </main>
</body>
</html>
