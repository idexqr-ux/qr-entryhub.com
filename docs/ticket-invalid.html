<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ticket not valid</title>
  <style>
    body {
      margin: 0;
      background: #f7f9f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .ticket {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    img {
      max-width: 320px;
      width: 100%;
      height: auto;
      margin: 24px auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="ticket">
    <div class="status invalid" style="width:100%; text-align:center; font-weight:bold; font-size:32px; padding:16px 0; letter-spacing:1px; background:#fdecea; color:#b00020;">NOT VALID</div>
    <img src="images/ticket-qr-valid.png" alt="Ticket QR code" />
  </div>
</body>
</html>
