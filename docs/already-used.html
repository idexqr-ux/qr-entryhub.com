<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ticket already used</title>
  <link rel="stylesheet" href="style.css?v=1" />

  <style>
    :root {
      --bg: #f7f9f8;
      --card: #ffffff;
      --text: #2f3a36;
      --muted: #5f6f69;
      --line: #d8e1dd;

      --warn-bg: #fff4e5;
      --warn-text: #8a5a00;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .wrap {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 40px 16px;
      text-align: center;
    }

    .ticket-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px 20px;
    }

    .status {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .warn {
      background: var(--warn-bg);
      color: var(--warn-text);
    }

    .helper {
      margin-top: 10px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="ticket-card">

      <div class="status warn">Already scanned</div>

      <p class="helper">
        This ticket has already been used. Please check with the organiser.
      </p>

    </section>
  </main>
</body>
</html>
