<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ticket recognised</title>
  <link rel="stylesheet" href="style.css?v=1" />

  <style>
    :root {
      --bg: #f7f9f8;
      --card: #ffffff;
      --text: #2f3a36;
      --muted: #5f6f69;
      --line: #d8e1dd;

      --accept-bg: #e6f4ec;
      --accept-text: #1f5f3a;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    .wrap {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 40px 16px;
      text-align: center;
    }

    .ticket-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px 20px;
    }

    .status {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    .accept {
      background: var(--accept-bg);
      color: var(--accept-text);
    }

    .ticket-name {
      font-size: 1.4rem;
      margin: 0 0 6px;
      font-weight: 600;
    }

    .ticket-id {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .event {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .helper {
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="ticket-card">

      <div class="status accept">Accepted</div>

      <p class="ticket-name">Ella Reed</p>
      <p class="ticket-id">Ticket: SHLS-001065</p>

      <p class="event">September Home and Living Show</p>

      <p class="helper">
        Ticket valid — allow entry.
      </p>

    </section>
  </main>
</body>
</html>
